# ============================================================
# Baseline GAN – 256×256  (RECOMMENDED DEFAULT)
# ============================================================
# Identical to sagan_256.yaml EXCEPT:
#   model.use_attention = false
#   model.attention_resolutions = []

experiment_name: gan_256

dataset:
  name: celebahq
  path: data/celebahq/train
  resolution: 256
  num_workers: 4

model:
  latent_dim: 128
  base_channels: 64
  use_attention: false
  attention_resolutions: []

training:
  batch_size: 32
  total_steps: 100000
  d_steps_per_g: 2
  loss_type: hinge
  lr_g: 0.0002
  lr_d: 0.0002
  beta1: 0.0
  beta2: 0.999
  use_ema: true
  ema_decay: 0.999
  mixed_precision: true
  multi_gpu: false

logging:
  log_dir: runs
  sample_freq: 1000
  checkpoint_freq: 5000
  eval_freq: 10000
  num_fid_images: 10000
  num_sample_images: 64

seed: 42
