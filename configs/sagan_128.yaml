# ============================================================
# Self-Attention GAN (SAGAN) – 128×128
# ============================================================
# Identical to gan_128.yaml EXCEPT:
#   model.use_attention = true
#   model.attention_resolutions = [32, 64]

experiment_name: sagan_128

dataset:
  name: celebahq
  path: data/celebahq/train
  resolution: 128
  num_workers: 4

model:
  latent_dim: 128
  base_channels: 64
  use_attention: true
  attention_resolutions: [32, 64]

training:
  batch_size: 64
  total_steps: 100000
  d_steps_per_g: 2
  loss_type: hinge
  lr_g: 0.0002
  lr_d: 0.0002
  beta1: 0.0
  beta2: 0.999
  use_ema: true
  ema_decay: 0.999
  mixed_precision: true
  multi_gpu: false

logging:
  log_dir: runs
  sample_freq: 1000
  checkpoint_freq: 5000
  eval_freq: 10000
  num_fid_images: 10000
  num_sample_images: 64

seed: 42
